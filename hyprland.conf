# ────────────────────────────────────────────────────────────
# Colors & Variables
# ────────────────────────────────────────────────────────────
$active_border = rgb(c29df2)
$inactive_border = rgba(5b6078aa)

# ────────────────────────────────────────────────────────────
# General Settings
# ────────────────────────────────────────────────────────────
general {
    gaps_in = 3     
    gaps_out = 5    
    border_size = 2
    col.active_border = $active_border
    col.inactive_border = $inactive_border
    layout = dwindle
}

# ────────────────────────────────────────────────────────────
# Decorations (Solid Look)
# ────────────────────────────────────────────────────────────
decoration {
    rounding = 12

    # Forced opacity for the "No Transparency" look
    active_opacity = 1.0
    inactive_opacity = 1.0
    fullscreen_opacity = 1.0

    blur {
        enabled = false # Disabled for solid theme
    }

    shadow {
        enabled = false
    }
}

# ────────────────────────────────────────────────────────────
# Animations (Fixed Syntax)
# ────────────────────────────────────────────────────────────
animations {
    enabled = yes
    bezier = calm, 0.25, 0.9, 0.35, 1

    animation = windows,     1, 4, calm
    animation = windowsIn,   1, 4, calm
    animation = windowsOut,  1, 3, calm
    animation = windowsMove, 1, 4, calm
    animation = fade,        1, 3, calm
    animation = workspaces,  1, 4, calm
    # 'layers' handles Walker, Waybar, and SwayOSD animations
    animation = layers,      1, 3, calm 
}
animations {
    enabled = yes
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    
    # Change 'slide' to 'slidevert' for vertical, or 'fade'
    animation = workspaces, 1, 6, myBezier, slide 
}

# ────────────────────────────────────────────────────────────
# Group Settings
# ────────────────────────────────────────────────────────────
group {
    col.border_active = $active_border
    col.border_inactive = $inactive_border
    
    groupbar {
        col.active = $active_border
        col.inactive = $inactive_border
        font_family = JetBrainsMono Nerd Font
        font_size = 10
    }
}

