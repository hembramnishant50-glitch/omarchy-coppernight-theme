# ────────────────────────────────────────────────────────────
# Omarchy Coppernight Theme
# ────────────────────────────────────────────────────────────

general {
    border_size = 2 
    col.active_border = rgba(fab387ff) 
    col.inactive_border = rgba(313244ff) 

    gaps_in = 3
    gaps_out = 6
}

animations {
    enabled = yes
    
    # A fluid curve with a slight bounce (overshoot) at the end
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    # A smooth, fast curve for fading and simple transitions
    bezier = smoothOut, 0.36, 0, 0.66, -0.56

    animation = windows,     1, 5, overshot, popin 15%
    animation = windowsIn,   1, 5, overshot, popin 15%
    animation = windowsOut,  1, 4, smoothOut, slide
    animation = windowsMove, 1, 5, overshot
    animation = fade,        1, 4, default
    animation = fadeIn,      1, 4, default
    animation = fadeOut,     1, 4, default
    animation = layers,      1, 4, overshot, popin 10%
    animation = layersIn,    1, 4, overshot, popin 10%
    animation = layersOut,   1, 3, smoothOut, slide
    animation = workspaces,  1, 6, overshot, slidefade 20%
}

decoration {
    rounding = 14
    
    # Slight transparency on inactive windows to let the blur show through
    active_opacity = 1.0
    inactive_opacity = 0.95
    fullscreen_opacity = 1.0 

    shadow {
        enabled = true
        range = 25
        render_power = 3
        color = rgba(00000077) 
        offset = 0 4
    } 
    
    blur {
        enabled = true
        size = 6              # Increased size for a wider, softer blur spread
        passes = 3            # 3 passes is the sweet spot for a smooth frosted glass look
        contrast = 1.0
        brightness = 1.1
        vibrancy = 0.16       # Brings out underlying wallpaper colors slightly
        vibrancy_darkness = 0.0
        noise = 0.02          # Reduced noise for a cleaner, modern look
        ignore_opacity = true
        new_optimizations = on
    }
}
# ────────────────────────────────────────────────────────────
# Ghostty Size & Position Fix
# ────────────────────────────────────────────────────────────
#windowrule = match:class com.mitchellh.ghostty, size 960x640
windowrule = match:class com.mitchellh.ghostty, center on

# ────────────────────────────────────────────────────────────
# Game Opacity - Full opacity for video games
# ────────────────────────────────────────────────────────────
windowrule = opacity 1.0 override, match:content game


# ────────────────────────────────────────────────────────────
# Layer Rules
# ────────────────────────────────────────────────────────────


layerrule = blur on, match:namespace walker
layerrule = ignore_alpha 0, match:namespace walker
layerrule = blur on, match:namespace waybar
layerrule = blur on, match:namespace notifications
layerrule = ignore_alpha 0, match:namespace notifications
layerrule = blur on, match:namespace vicinae
layerrule = blur on, match:namespace swayosd
layerrule = ignore_alpha 0.1, match:namespace waybar
layerrule = ignore_alpha 0.1, match:namespace vicinae
